site_name: tiderace
site_description: "⚡ Rust-powered Python test engine — parallel execution, impact analysis, coverage"
site_url: https://snoodleboot-io.github.io/tiderace/
repo_url: https://github.com/snoodleboot-io/tiderace
repo_name: snoodleboot-io/tiderace
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.integrate

extra_css:
  - assets/tiderace.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/snoodleboot-io/tiderace

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: guides/installation.md
    - Quick Start: guides/quickstart.md
    - Watch Mode: guides/watch.md
    - Configuration: guides/configuration.md
    - Migrating from pytest: guides/migration.md
    - Continuous Integration: guides/ci.md
    - Benchmarks: guides/benchmarks.md
  - How It Works:
    - Overview: design/overview.md
    - Impact Analysis: design/impact-analysis.md
    - Execution Model: design/parallel-execution.md
    - Coverage Engine: design/coverage.md
    - State Database: design/database.md
  - API Reference:
    - CLI Reference: api/cli.md
    - Exit Codes: api/exit-codes.md
    - Database Schema: api/schema.md
  - Design Documents:
    - Architecture: design/architecture.md
    - Module Design: design/modules.md
    - Decision Log: design/decisions.md
  - Contributing:
    - Development Setup: guides/contributing.md
    - Release Process: guides/releases.md
