name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  engine-linux:
    name: engine · linux · build · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-engine-cargo-${{ hashFiles('engine/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      # The fork-based live integration tests self-skip without the fx venv (numpy/sqlite), which is
      # deliberately not provisioned here — so this covers unit/lib + daemon + the self-skipping
      # acceptance suite. The Python shim proofs are exercised separately (py-riptide/proof_*.py).
      - name: Unit + lib + daemon tests
        run: cargo test --all

      - name: Release build
        run: cargo build --release

  engine-windows:
    # ADR-E008 capability matrix: validate the pure-Rust engine compiles and its unit/lib + daemon
    # logic passes on Windows, which has no fork(). The fork-based live integration tests self-skip
    # without the fx venv, so this gate covers compile + clippy + fmt + unit/lib/daemon. The no-fork
    # SubprocessWorker acceptance on Windows (driving the --no-fork shim against a real Python) is the
    # remaining Phase-7 piece in ROADMAP-v2.
    name: engine · windows · build · lint · unit
    runs-on: windows-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-engine-cargo-${{ hashFiles('engine/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit + lib + daemon tests (fork integration self-skips without the venv)
        run: cargo test --all
      - name: Release build
        run: cargo build --release

  engine-coverage:
    name: engine · coverage (line >= 88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Provision the fx venv (numpy + pytest) at the repo root
        # The fork-based acceptance + daemon e2e tests resolve <repo>/.riptide-fx-venv by path (no env
        # needed). Without it they self-skip and the exec/fork + daemon paths go uncovered, so the gate
        # would only measure the pure-logic core. fx_corpus imports numpy + pytest.
        run: |
          python -m venv .riptide-fx-venv
          .riptide-fx-venv/bin/pip install --upgrade pip
          .riptide-fx-venv/bin/pip install numpy pytest
      - name: Coverage gate (engine workspace, line >= 88)
        working-directory: engine
        # Exclude binary glue with no logic from the denominator: main.rs (CLI entry / arg dispatch) and
        # socket.rs (the Unix-socket serve loop — a killed-process path that can't flush its profile,
        # the analogue of the previous watcher.rs exclusion). Everything else — including the exec/fork +
        # daemon live paths, covered because the venv is provisioned above — is measured. Local baseline
        # ~91% lines; the gate sits at 88 for headroom.
        run: cargo llvm-cov --workspace --ignore-filename-regex '(main|socket)\.rs' --fail-under-lines 88
