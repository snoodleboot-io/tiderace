name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: build · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        # Integration tests run the real binary against real pytest, so these
        # must be present (coverage powers source-level impact analysis).
        run: python -m pip install --upgrade pip pytest coverage

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + integration tests
        env:
          # Point the integration suite at the CI Python that has pytest.
          RIPTIDE_TEST_PYTHON: python
        run: cargo test --all

      - name: Release build
        run: cargo build --release

  coverage:
    name: coverage (line >= 80)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pytest coverage
      - name: Coverage gate
        env:
          RIPTIDE_TEST_PYTHON: python
        run: cargo llvm-cov --all --fail-under-lines 80
