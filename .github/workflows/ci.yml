name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  engine-linux:
    name: engine · linux · build · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-engine-cargo-${{ hashFiles('engine/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Provision the fx venv (numpy + pytest) at the repo root
        # Previously skipped here, which meant this job ran the *entire* live suite as no-ops: the
        # fork/no-fork/sub-interpreter acceptances resolve <repo>/.tiderace-fx-venv by path and, absent
        # it, early-returned — which the Rust harness reports as `ok`. The job was green on the
        # engine's load-bearing invariants (no-fork ≡ fork, sub-interp ≡ fork) without executing one
        # of them. Provisioning costs ~15s and makes the green mean something.
        working-directory: .
        run: |
          python -m venv .tiderace-fx-venv
          .tiderace-fx-venv/bin/pip install --upgrade pip
          .tiderace-fx-venv/bin/pip install numpy pytest

      - name: Unit + lib + daemon + live acceptance tests
        # TIDERACE_REQUIRE_LIVE=1 turns a live-scenario skip into a failure (engine_core::testing).
        # This job provisions the interpreter above, so a skip here means the environment broke — and
        # that must fail loudly rather than pass as a silent no-op.
        env:
          TIDERACE_REQUIRE_LIVE: "1"
        run: cargo test --all

      - name: Type-check the excluded engine-inproc crate
        # `engine-inproc` (the PyO3 ② side-bet) is excluded from the workspace, so `--workspace` never
        # touches it, and it has no tests of its own. It silently bit-rotted: TID-1 added
        # `ExecResponse.pure` and this crate stopped compiling — unnoticed, because nothing built it.
        #
        # `cargo check` catches that in seconds and does NOT link, so it needs no libpython dev package
        # (which is what makes a full build here awkward). Keep it a check, not a build.
        working-directory: engine/crates/engine-inproc
        run: cargo check --all-targets

      - name: Release build
        run: cargo build --release

  engine-windows:
    # ADR-E008 capability matrix: validate the pure-Rust engine compiles and its unit/lib + daemon
    # logic passes on Windows, which has no fork(). The fork-based live integration tests self-skip
    # without the fx venv; the **no-fork SubprocessWorker acceptance** (nofork_acceptance.rs) DOES run
    # here — it drives the `--no-fork` shim against the interpreter provisioned below, exercising the
    # no-COW fallback on the platform it exists for (TID-5 / ROADMAP-v2 Phase-7).
    name: engine · windows · build · lint · unit
    runs-on: windows-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: ${{ runner.os }}-engine-cargo-${{ hashFiles('engine/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Set up Python
        # Provides `python` on PATH so the no-fork acceptance runs on Windows (no fork() here).
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Unit + lib + daemon tests (no-fork acceptance runs; fork integration self-skips)
        run: cargo test --all
      - name: Release build
        run: cargo build --release

  engine-coverage:
    name: engine · coverage (line >= 88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Provision the fx venv (numpy + pytest) at the repo root
        # The fork-based acceptance + daemon e2e tests resolve <repo>/.tiderace-fx-venv by path (no env
        # needed). Without it they self-skip and the exec/fork + daemon paths go uncovered, so the gate
        # would only measure the pure-logic core. fx_corpus imports numpy + pytest.
        run: |
          python -m venv .tiderace-fx-venv
          .tiderace-fx-venv/bin/pip install --upgrade pip
          .tiderace-fx-venv/bin/pip install numpy pytest
      - name: Coverage gate (engine workspace, line >= 88)
        working-directory: engine
        # Exclude binary glue with no logic from the denominator: main.rs (CLI entry / arg dispatch) and
        # socket.rs (the Unix-socket serve loop — a killed-process path that can't flush its profile,
        # the analogue of the previous watcher.rs exclusion). Everything else — including the exec/fork +
        # daemon live paths, covered because the venv is provisioned above — is measured. Local baseline
        # ~91% lines; the gate sits at 88 for headroom.
        # TIDERACE_REQUIRE_LIVE=1: the venv is provisioned above, so a silent live-skip here would
        # quietly drop the exec/fork + daemon paths out of the measured set and shrink the gate to the
        # pure-logic core. Fail instead.
        env:
          TIDERACE_REQUIRE_LIVE: "1"
        run: cargo llvm-cov --workspace --ignore-filename-regex '(main|socket)\.rs' --fail-under-lines 88
