name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: build linux-x86_64 binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin riptide

      - name: Stage artifact
        run: |
          install -Dm755 target/release/riptide "dist/riptide-linux-x86_64"
          (cd dist && sha256sum riptide-linux-x86_64 > riptide-linux-x86_64.sha256)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: riptide-linux-x86_64
          path: dist/*

      # Attaches the binary to the GitHub Release when triggered by a tag push.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
