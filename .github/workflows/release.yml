name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: build linux-x86_64 binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --bin tiderace --bin tiderace-daemon

      - name: Stage artifacts
        run: |
          mkdir -p dist
          install -Dm755 target/release/tiderace        "dist/tiderace-linux-x86_64"
          install -Dm755 target/release/tiderace-daemon "dist/tiderace-daemon-linux-x86_64"
          (cd dist && sha256sum tiderace-linux-x86_64 tiderace-daemon-linux-x86_64 > sha256sums.txt)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tiderace-linux-x86_64
          path: engine/dist/*

      # Attaches the binaries to the GitHub Release when triggered by a tag push.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: engine/dist/*
